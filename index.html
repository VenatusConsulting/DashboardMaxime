<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Empire — Dashboard</title>
<link rel="apple-touch-icon" href="empire_icon.png">
<link rel="icon" type="image/png" href="empire_icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

:root {
  --bg: #080808;
  --s1: #0f0f0f;
  --s2: #141414;
  --s3: #1a1a1a;
  --b: rgba(255,255,255,0.055);
  --b2: rgba(255,255,255,0.09);
  --b3: rgba(255,255,255,0.14);
  --text: #f2f2f2;
  --t2: #8a8a8a;
  --t3: #444;
  --green: #16a34a;
  --green-light: #22c55e;
  --green-bg: rgba(34,197,94,0.08);
  --orange: #d97706;
  --orange-light: #f59e0b;
  --orange-bg: rgba(245,158,11,0.08);
  --red: #dc2626;
  --red-light: #ef4444;
  --red-bg: rgba(239,68,68,0.08);
  --accent: #f59e0b;
  --discord: #5865F2;
  --ofm: #a855f7;
  --r: 10px;
  --r2: 14px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: -0.01em;
}

/* ── LAYOUT ── */
.shell { max-width: 1080px; margin: 0 auto; padding: 0 28px 80px; }

/* ── AUTH ── */
#auth-screen {
  display: none; position: fixed; inset: 0; background: var(--bg);
  z-index: 1000; align-items: center; justify-content: center;
}
.auth-box {
  text-align: center; padding: 52px 44px;
  background: var(--s1); border: 1px solid var(--b);
  border-radius: 20px; max-width: 340px; width: 100%;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 24px 64px rgba(0,0,0,0.6);
}
.auth-title { font-size: 13px; font-weight: 500; letter-spacing: 0.14em; color: var(--t2); margin-bottom: 36px; }
.auth-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 11px 18px;
  background: var(--s2); border: 1px solid var(--b2);
  border-radius: var(--r); color: var(--text); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.18s; font-family: inherit; letter-spacing: -0.01em;
}
.auth-btn:hover { background: var(--s3); border-color: var(--b3); }
#auth-error { font-size: 12px; color: var(--red-light); margin-top: 14px; }

/* ── HEADER ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 32px 0 28px;
  border-bottom: 1px solid var(--b);
  margin-bottom: 40px;
}
.logo { display: flex; align-items: center; gap: 9px; }
.logo-mark {
  width: 20px; height: 20px; border-radius: 6px;
  background: linear-gradient(135deg, #f59e0b, #ef4444);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #000; letter-spacing: 0;
  flex-shrink: 0;
}
.logo-name { font-size: 14px; font-weight: 600; letter-spacing: 0.04em; color: var(--text); }
.header-meta { display: flex; align-items: center; gap: 20px; }
.sync-row { display: flex; align-items: center; gap: 7px; }
.sync-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--t3); flex-shrink: 0; }
.sync-dot.live { background: var(--green-light); animation: blink 2.5s ease infinite; }
.sync-dot.loading { background: var(--accent); animation: blink 0.6s ease infinite; }
.sync-dot.error { background: var(--red-light); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
.sync-text { font-size: 11px; color: var(--t3); font-family: 'JetBrains Mono', monospace; }
.sync-btn {
  font-size: 12px; font-weight: 500; color: var(--t2); background: none;
  border: 1px solid var(--b); border-radius: 7px; padding: 5px 11px;
  cursor: pointer; transition: all 0.15s; font-family: inherit; letter-spacing: -0.01em;
}
.sync-btn:hover { color: var(--text); border-color: var(--b2); background: var(--s2); }

/* ── SECTION LABEL ── */
.sec {
  font-size: 11px; font-weight: 500; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--t3);
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 14px;
}
.sec::after { content: ''; flex: 1; height: 1px; background: var(--b); }

/* ── CARD ── */
.card {
  background: var(--s1); border: 1px solid var(--b);
  border-radius: var(--r2); padding: 22px;
  transition: border-color 0.2s ease;
  position: relative; overflow: hidden;
}
.card:hover { border-color: var(--b2); }

/* ── KPI GRID ── */
.kpi-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 10px; margin-bottom: 10px; }
@media(max-width:880px){ .kpi-grid { grid-template-columns: repeat(3,1fr); } }
@media(max-width:480px){ .kpi-grid { grid-template-columns: repeat(2,1fr); } }

.kpi-card {
  background: var(--s1); border: 1px solid var(--b);
  border-radius: var(--r2); padding: 18px 16px 16px;
  transition: border-color 0.2s ease; position: relative; overflow: hidden;
}
.kpi-card:hover { border-color: var(--b2); }
.kpi-card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  border-radius: var(--r2) var(--r2) 0 0;
  opacity: 0; transition: opacity 0.3s;
}
.kpi-card.c-green::after { background: var(--green-light); opacity: 1; }
.kpi-card.c-orange::after { background: var(--orange-light); opacity: 1; }
.kpi-card.c-red::after { background: var(--red-light); opacity: 1; }

.kpi-lbl { font-size: 11px; color: var(--t2); font-weight: 400; margin-bottom: 12px; }
.kpi-val {
  font-size: 26px; font-weight: 600; line-height: 1;
  letter-spacing: -0.03em; font-variant-numeric: tabular-nums;
  transition: color 0.3s;
}
.kpi-card.c-green .kpi-val { color: var(--green-light); }
.kpi-card.c-orange .kpi-val { color: var(--orange-light); }
.kpi-card.c-red .kpi-val { color: var(--red-light); }
.kpi-hint { font-size: 10px; color: var(--t3); margin-top: 8px; }

.kpi-bar { margin-top: 12px; height: 2px; background: var(--s3); border-radius: 2px; overflow: hidden; }
.kpi-bar-fill { height: 100%; border-radius: 2px; transition: width 0.9s cubic-bezier(0.4,0,0.2,1); }
.c-green .kpi-bar-fill { background: var(--green-light); }
.c-orange .kpi-bar-fill { background: var(--orange-light); }
.c-red .kpi-bar-fill { background: var(--red-light); }

/* ── SKELETON ── */
.skel {
  background: linear-gradient(90deg, var(--s2) 25%, var(--s3) 50%, var(--s2) 75%);
  background-size: 200% 100%; animation: shimmer 1.4s ease infinite; border-radius: 4px;
}
@keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }

/* ── CHART SECTION ── */
.chart-card { margin-bottom: 40px; }
.chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.chart-title { font-size: 13px; font-weight: 500; color: var(--t2); }
.chart-controls { display: flex; align-items: center; gap: 8px; }

/* Metric tabs */
.metric-tabs { display: flex; gap: 4px; }
.metric-tab {
  font-size: 12px; font-weight: 500; color: var(--t3); background: none;
  border: 1px solid transparent; border-radius: 6px; padding: 4px 10px;
  cursor: pointer; transition: all 0.15s; font-family: inherit; letter-spacing: -0.01em;
}
.metric-tab:hover { color: var(--t2); border-color: var(--b); }
.metric-tab.active { color: var(--text); background: var(--s2); border-color: var(--b2); }

/* Period tabs */
.period-tabs { display: flex; gap: 2px; background: var(--s2); border-radius: 7px; padding: 2px; }
.period-tab {
  font-size: 11px; font-weight: 500; color: var(--t3); background: transparent;
  border: none; border-radius: 5px; padding: 4px 10px;
  cursor: pointer; transition: all 0.15s; font-family: inherit;
}
.period-tab.active { color: var(--text); background: var(--s3); }
.period-tab:hover:not(.active) { color: var(--t2); }

/* Chart bars */
.chart-area { height: 90px; display: flex; align-items: flex-end; gap: 3px; }
.cbar {
  flex: 1; border-radius: 3px 3px 0 0; min-height: 2px;
  cursor: pointer; transition: opacity 0.15s ease;
  position: relative;
}
.cbar:hover { opacity: 0.75; }
.cbar .ctip {
  position: absolute; bottom: calc(100% + 6px); left: 50%;
  transform: translateX(-50%);
  background: var(--s3); border: 1px solid var(--b2);
  border-radius: 6px; padding: 4px 8px;
  font-size: 10px; color: var(--text); white-space: nowrap;
  pointer-events: none; opacity: 0; transition: opacity 0.12s; z-index: 10;
  font-family: 'JetBrains Mono', monospace;
}
.cbar:hover .ctip { opacity: 1; }

.chart-xlabels {
  display: flex; justify-content: space-between; margin-top: 8px;
  font-size: 10px; color: var(--t3); font-family: 'JetBrains Mono', monospace;
}

/* ── BUSINESS GRID ── */
.biz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 40px; }
@media(max-width:580px){ .biz-grid { grid-template-columns: 1fr; } }

.biz-card {
  background: var(--s1); border: 1px solid var(--b);
  border-radius: var(--r2); padding: 24px;
  transition: border-color 0.2s;
}
.biz-card:hover { border-color: var(--b2); }

.biz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.biz-name { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; color: var(--t2); letter-spacing: 0.04em; }
.biz-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.biz-trend {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 500; padding: 3px 7px;
  border-radius: 5px;
}
.biz-trend.up { color: var(--green-light); background: var(--green-bg); }
.biz-trend.down { color: var(--red-light); background: var(--red-bg); }
.biz-trend.neutral { color: var(--t3); }

.biz-ca {
  font-size: 38px; font-weight: 600; letter-spacing: -0.03em;
  line-height: 1; font-variant-numeric: tabular-nums; color: var(--text);
  margin-bottom: 20px;
}

.biz-progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--t3); margin-bottom: 7px; }
.biz-track { height: 3px; background: var(--s3); border-radius: 2px; overflow: hidden; }
.biz-fill { height: 100%; border-radius: 2px; transition: width 1s cubic-bezier(0.4,0,0.2,1); }

/* ── DUBAI ── */
.dubai {
  background: var(--s1);
  border: 1px solid rgba(245,158,11,0.12);
  border-radius: var(--r2); padding: 28px;
  position: relative; overflow: hidden; margin-bottom: 40px;
}
.dubai::before {
  content: ''; position: absolute; top: -60px; right: -60px;
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(245,158,11,0.05) 0%, transparent 65%);
  pointer-events: none;
}
.dubai-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(245,158,11,0.5); margin-bottom: 10px; }
.dubai-amount {
  font-size: 48px; font-weight: 600; letter-spacing: -0.04em;
  line-height: 1; color: var(--accent); font-variant-numeric: tabular-nums;
  margin-bottom: 6px;
}
.dubai-target { font-size: 12px; color: var(--t3); margin-bottom: 24px; }

.dubai-bar-wrap { margin-bottom: 24px; }
.dubai-bar-track { height: 5px; background: rgba(245,158,11,0.08); border-radius: 3px; overflow: hidden; }
.dubai-bar-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, #f59e0b, #fb923c);
  transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
}

.dubai-row { display: flex; gap: 0; }
.dubai-stat { flex: 1; padding: 14px 0; }
.dubai-stat + .dubai-stat { border-left: 1px solid var(--b); padding-left: 20px; margin-left: 0; }
.dubai-stat-val { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; color: var(--text); }
.dubai-stat-lbl { font-size: 11px; color: var(--t3); margin-top: 3px; }

.dubai-breakdown { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--b); }
.dubai-line { display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
.dubai-line-label { color: var(--t2); display: flex; align-items: center; gap: 7px; }
.dubai-line-val { color: var(--text); font-weight: 500; font-variant-numeric: tabular-nums; }

/* ── CHART SUMMARY ── */
.csumm-item { flex: 1; }
.csumm-val { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; line-height: 1; }
.csumm-lbl { font-size: 11px; color: var(--t3); margin-top: 5px; }

/* ── EMPTY / ERROR ── */
.empty-state { font-size: 12px; color: var(--t3); padding: 10px 0; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen" style="display:flex;">
  <div class="auth-box">
    <div class="auth-title">EMPIRE · DASHBOARD</div>
    <button class="auth-btn" onclick="signInWithGoogle()">
      <svg width="15" height="15" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
      Continuer avec Google
    </button>
    <div id="auth-error"></div>
  </div>
</div>

<div class="shell" id="main" style="display:none;">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-mark">E</div>
      <span class="logo-name">Empire</span>
    </div>
    <div class="header-meta">
      <div class="sync-row">
        <div class="sync-dot" id="sync-dot"></div>
        <span class="sync-text" id="sync-label">—</span>
        <span class="sync-text" id="last-sync" style="color:var(--t3)"></span>
      </div>
      <button class="sync-btn" onclick="loadAll()">↻ Sync</button>
    </div>
  </header>

  <!-- ── DISCIPLINE ── -->
  <div class="sec">Discipline</div>

  <!-- KPI CARDS -->
  <div class="kpi-grid" id="kpi-grid" style="margin-bottom:12px;">
    <!-- Skeleton -->
    <div class="kpi-card"><div class="kpi-lbl">Planning</div><div class="skel" style="height:26px;width:54px;margin-top:4px;"></div></div>
    <div class="kpi-card"><div class="kpi-lbl">Deep Work</div><div class="skel" style="height:26px;width:54px;margin-top:4px;"></div></div>
    <div class="kpi-card"><div class="kpi-lbl">Scroll RS</div><div class="skel" style="height:26px;width:54px;margin-top:4px;"></div></div>
    <div class="kpi-card"><div class="kpi-lbl">Sport</div><div class="skel" style="height:26px;width:54px;margin-top:4px;"></div></div>
    <div class="kpi-card"><div class="kpi-lbl">Diet</div><div class="skel" style="height:26px;width:54px;margin-top:4px;"></div></div>
    <div class="kpi-card"><div class="kpi-lbl">Note moy.</div><div class="skel" style="height:26px;width:54px;margin-top:4px;"></div></div>
  </div>

  <!-- CHART -->
  <div class="card chart-card">
    <div class="chart-header">
      <div class="metric-tabs" id="metric-tabs">
        <button class="metric-tab active" data-metric="note" onclick="setMetric('note',this)">Note</button>
        <button class="metric-tab" data-metric="deepWork" onclick="setMetric('deepWork',this)">Deep Work</button>
        <button class="metric-tab" data-metric="scrollRS" onclick="setMetric('scrollRS',this)">Scroll RS</button>
        <button class="metric-tab" data-metric="planning" onclick="setMetric('planning',this)">Planning</button>
        <button class="metric-tab" data-metric="sport" onclick="setMetric('sport',this)">Sport</button>
        <button class="metric-tab" data-metric="diet" onclick="setMetric('diet',this)">Diet</button>
      </div>
      <div class="period-tabs">
        <button class="period-tab active" onclick="setPeriod(7,this)">7j</button>
        <button class="period-tab" onclick="setPeriod(30,this)">30j</button>
        <button class="period-tab" onclick="setPeriod(90,this)">90j</button>
      </div>
    </div>
    <div id="chart-summary" style="display:flex;gap:24px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--b);"></div>
    <div class="chart-area" id="chart-area"></div>
    <div class="chart-xlabels" id="chart-xlabels"></div>
  </div>

  <!-- ── BUSINESS ── -->
  <div class="sec">Business</div>

  <div class="biz-grid">
    <!-- DISCORD -->
    <div class="biz-card">
      <div class="biz-header">
        <div class="biz-name"><div class="biz-dot" style="background:var(--discord);"></div>Discord</div>
        <div class="biz-trend neutral" id="discord-trend">—</div>
      </div>
      <div class="biz-ca" id="discord-ca">—</div>
      <div class="biz-progress-label">
        <span id="discord-goal-lbl">vs objectif</span>
        <span id="discord-pct" style="font-weight:500;">—</span>
      </div>
      <div class="biz-track"><div class="biz-fill" id="discord-bar" style="width:0%;background:var(--discord);"></div></div>
    </div>

    <!-- OFM -->
    <div class="biz-card">
      <div class="biz-header">
        <div class="biz-name"><div class="biz-dot" style="background:var(--ofm);"></div>OFM</div>
        <div class="biz-trend neutral" id="ofm-trend">—</div>
      </div>
      <div class="biz-ca" id="ofm-ca">—</div>
      <div class="biz-progress-label">
        <span id="ofm-goal-lbl">vs objectif</span>
        <span id="ofm-pct" style="font-weight:500;">—</span>
      </div>
      <div class="biz-track"><div class="biz-fill" id="ofm-bar" style="width:0%;background:var(--ofm);"></div></div>
    </div>
  </div>

  <!-- ── DUBAI 2027 ── -->
  <div class="sec">Objectif Dubai 2027</div>

  <div class="dubai">
    <div class="dubai-eyebrow">Progression annuelle 2025</div>
    <div class="dubai-amount" id="dubai-amount">—</div>
    <div class="dubai-target">sur 223 000 € · objectif annuel cumulé</div>
    <div class="dubai-bar-wrap">
      <div class="dubai-bar-track"><div class="dubai-bar-fill" id="dubai-fill" style="width:0%;"></div></div>
    </div>
    <div class="dubai-row">
      <div class="dubai-stat">
        <div class="dubai-stat-val" id="dubai-pct">—</div>
        <div class="dubai-stat-lbl">atteint</div>
      </div>
      <div class="dubai-stat" style="padding-left:20px;">
        <div class="dubai-stat-val" id="dubai-remaining">—</div>
        <div class="dubai-stat-lbl">restant</div>
      </div>
    </div>
    <div class="dubai-breakdown">
      <div class="dubai-line">
        <div class="dubai-line-label"><div class="biz-dot" style="background:var(--discord);width:5px;height:5px;border-radius:50%;"></div>Discord</div>
        <div class="dubai-line-val" id="dubai-discord">—</div>
      </div>
      <div class="dubai-line">
        <div class="dubai-line-label"><div class="biz-dot" style="background:var(--ofm);width:5px;height:5px;border-radius:50%;"></div>OFM</div>
        <div class="dubai-line-val" id="dubai-ofm">—</div>
      </div>
      <div class="dubai-line" style="padding-top:8px;border-top:1px solid var(--b);margin-top:2px;">
        <div class="dubai-line-label" style="font-weight:500;color:var(--text);">Total</div>
        <div class="dubai-line-val" style="color:var(--accent);" id="dubai-total">—</div>
      </div>
    </div>
  </div>

</div><!-- end shell -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

async function notionQuery(dbId, filter = {}, sorts = []) {
  const res = await fetch(PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ dbId, filter, sorts }),
  });
  if (!res.ok) throw new Error(`Proxy error: ${res.status}`);
  return res.json();
}

function getProp(page, name) {
  const prop = page.properties?.[name];
  if (!prop) return null;
  switch(prop.type) {
    case 'number':    return prop.number;
    case 'checkbox':  return prop.checkbox; // returns true or false
    case 'select':    return prop.select?.name;
    case 'date':      return prop.date?.start;
    case 'formula':   return prop.formula?.number ?? prop.formula?.string;
    case 'title':     return prop.title?.[0]?.plain_text;
    case 'rich_text': return prop.rich_text?.[0]?.plain_text;
    default:          return null;
  }
}

// ── DISCIPLINE ─────────────────────────────────────────────────────────────
let disciplineData = [];
let chartMetric = 'note';
let chartPeriod = 7;

async function loadDiscipline() {
  const res = await notionQuery(DB_DISCIPLINE, {}, [{ property: 'Date', direction: 'descending' }]);
  disciplineData = (res.results || []).map(p => ({
    date:     getProp(p, 'Date'),
    planning: getProp(p, 'Planning respecté'),
    deepWork: getProp(p, 'Deep Work'),
    scrollRS: getProp(p, 'Scroll RS'),
    sport:    getProp(p, 'Sport'),
    diet:     getProp(p, 'Diet'),
    note:     getProp(p, 'Note'),
  })).filter(d => d.date);
  renderKPIs();
  renderChart();
}

// Color logic per metric
function kpiClass(metric, val) {
  if (val === null) return '';
  switch(metric) {
    case 'planning': return val >= 95 ? 'c-green' : val >= 80 ? 'c-orange' : 'c-red';
    case 'deepWork': return val >= 7  ? 'c-green' : val >= 5  ? 'c-orange' : 'c-red';
    case 'scrollRS': return val <= 1.5? 'c-green' : val <= 2.5? 'c-orange' : 'c-red';
    case 'sport':    return val >= 100? 'c-green' : val >= 80  ? 'c-orange' : 'c-red';
    case 'diet':     return val >= 100? 'c-green' : val >= 80  ? 'c-orange' : 'c-red';
    case 'note':     return val >= 8  ? 'c-green' : val >= 6  ? 'c-orange' : 'c-red';
    default:         return '';
  }
}

function barColor(cls) {
  return cls === 'c-green' ? 'var(--green-light)' : cls === 'c-orange' ? 'var(--orange-light)' : 'var(--red-light)';
}

function renderKPIs() {
  const d30 = disciplineData.slice(0, 30);
  const n = d30.length || 1;

  const isTrue = v => v === true || v === 'Oui'; // supports both checkbox and select
  const planPct  = d30.length ? Math.round(d30.filter(d => isTrue(d.planning)).length / n * 100) : null;
  const dwAvg    = d30.length ? +(d30.reduce((s,d) => s+(d.deepWork||0),0)/n).toFixed(1) : null;
  const rsAvg    = d30.length ? +(d30.reduce((s,d) => s+(d.scrollRS||0),0)/n).toFixed(1) : null;
  const sportPct = d30.length ? Math.round(d30.filter(d => isTrue(d.sport)).length / n * 100) : null;
  const dietPct  = d30.length ? Math.round(d30.filter(d => isTrue(d.diet)).length / n * 100) : null;
  const noteAvg  = d30.length ? +(d30.reduce((s,d) => s+(d.note||0),0)/n).toFixed(1) : null;

  const kpis = [
    { lbl:'Planning', val:planPct,  display: planPct  !== null ? planPct+'%'  : '—', metric:'planning', bar: planPct },
    { lbl:'Deep Work',val:dwAvg,    display: dwAvg    !== null ? dwAvg+'h'    : '—', metric:'deepWork', bar: null },
    { lbl:'Scroll RS', val:rsAvg,   display: rsAvg    !== null ? rsAvg+'h'    : '—', metric:'scrollRS', bar: null },
    { lbl:'Sport',    val:sportPct, display: sportPct !== null ? sportPct+'%' : '—', metric:'sport',    bar: sportPct },
    { lbl:'Diet',     val:dietPct,  display: dietPct  !== null ? dietPct+'%'  : '—', metric:'diet',     bar: dietPct },
    { lbl:'Note moy.',val:noteAvg,  display: noteAvg  !== null ? noteAvg+'/10': '—', metric:'note',     bar: noteAvg !== null ? noteAvg*10 : null },
  ];

  document.getElementById('kpi-grid').innerHTML = kpis.map(k => {
    const cls = kpiClass(k.metric, k.val);
    const bc  = barColor(cls);
    return `<div class="kpi-card ${cls}">
      <div class="kpi-lbl">${k.lbl}</div>
      <div class="kpi-val">${k.display}</div>
      ${k.bar !== null ? `<div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(100,k.bar)}%;background:${bc};"></div></div>` : ''}
    </div>`;
  }).join('');
}

// Chart color per metric
function chartColor(metric, val) {
  if (val === null) return 'var(--s3)';
  const cls = kpiClass(metric, val);
  return cls === 'c-green' ? 'var(--green-light)' : cls === 'c-orange' ? 'var(--orange-light)' : 'var(--red-light)';
}

function getMetricVal(d, metric) {
  const isT = v => v === true || v === 'Oui';
  const isF = v => v === false || v === 'Non';
  switch(metric) {
    case 'planning': return isT(d.planning) ? 100 : isF(d.planning) ? 0 : null;
    case 'deepWork': return d.deepWork;
    case 'scrollRS': return d.scrollRS;
    case 'sport':    return isT(d.sport) ? 100 : isF(d.sport) ? 0 : null;
    case 'diet':     return isT(d.diet) ? 100 : isF(d.diet) ? 0 : null;
    case 'note':     return d.note;
    default:         return null;
  }
}

function renderChart() {
  const data = disciplineData.slice(0, chartPeriod).reverse();
  const el = document.getElementById('chart-area');
  const xlbl = document.getElementById('chart-xlabels');

  if (!data.length) {
    el.innerHTML = '<div class="empty-state">Aucune donnée</div>';
    xlbl.innerHTML = '';
    return;
  }

  const vals = data.map(d => getMetricVal(d, chartMetric));
  const max  = Math.max(...vals.filter(v => v !== null), 1);

  el.innerHTML = data.map((d, i) => {
    const val = vals[i];
    const h   = val !== null ? Math.max(3, Math.round((val/max)*86)) : 3;
    const col = val !== null ? chartColor(chartMetric, val) : 'var(--s3)';
    const dateStr = new Date(d.date).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
    const tipVal  = val !== null ? (chartMetric === 'note' ? val+'/10' : chartMetric === 'deepWork' || chartMetric === 'scrollRS' ? val+'h' : val+'%') : '—';
    return `<div class="cbar" style="height:${h}px;background:${col};opacity:${val !== null ? 0.85 : 0.2};">
      <span class="ctip">${dateStr} · ${tipVal}</span>
    </div>`;
  }).join('');

  renderChartSummary();

  // Labels — show only a few
  const step = Math.max(1, Math.ceil(data.length / 5));
  xlbl.innerHTML = data.map((d, i) => {
    if (i % step !== 0 && i !== data.length-1) return `<span></span>`;
    return `<span>${new Date(d.date).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span>`;
  }).join('');
}

function renderChartSummary() {
  const isTrue = v => v === true || v === 'Oui';
  const data = disciplineData.slice(0, chartPeriod).reverse();
  const el = document.getElementById('chart-summary');
  if (!data.length) { el.innerHTML = ''; return; }

  const vals = data.map(d => getMetricVal(d, chartMetric)).filter(v => v !== null);
  const today = data[data.length - 1];
  const todayVal = today ? getMetricVal(today, chartMetric) : null;

  function stat(label, value, color) {
    const col = color || 'var(--text)';
    return `<div class="csumm-item">
      <div class="csumm-val" style="color:${col}">${value}</div>
      <div class="csumm-lbl">${label}</div>
    </div>`;
  }

  function fmtVal(v, metric) {
    if (v === null || v === undefined) return '—';
    if (metric === 'deepWork' || metric === 'scrollRS') return v+'h';
    if (metric === 'note') return v+'/10';
    if (metric === 'planning' || metric === 'sport' || metric === 'diet') return v+'%';
    return v;
  }

  let html = '';
  const avg = vals.length ? +(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : null;
  const todayColor = todayVal !== null ? chartColor(chartMetric, todayVal) : 'var(--t3)';

  switch(chartMetric) {
    case 'deepWork':
      const maxDW = vals.length ? Math.max(...vals) : null;
      html = stat('Moyenne', fmtVal(avg,'deepWork')) +
             stat('Meilleur jour', fmtVal(maxDW,'deepWork'), 'var(--green-light)') +
             stat("Aujourd'hui", fmtVal(todayVal,'deepWork'), todayColor);
      break;
    case 'scrollRS':
      const minRS = vals.length ? Math.min(...vals) : null;
      html = stat('Moyenne', fmtVal(avg,'scrollRS')) +
             stat('Minimum', fmtVal(minRS,'scrollRS'), 'var(--green-light)') +
             stat("Aujourd'hui", fmtVal(todayVal,'scrollRS'), todayColor);
      break;
    case 'planning': {
      const ok = data.filter(d => isTrue(d.planning)).length;
      const pct = data.length ? Math.round(ok/data.length*100) : 0;
      html = stat('Taux de réussite', pct+'%', chartColor('planning', pct)) +
             stat('Jours respectés', ok+' / '+data.length);
      break;
    }
    case 'sport': {
      const ok = data.filter(d => isTrue(d.sport)).length;
      const pct = data.length ? Math.round(ok/data.length*100) : 0;
      html = stat('Taux de réussite', pct+'%', chartColor('sport', pct)) +
             stat('Jours de sport', ok+' / '+data.length);
      break;
    }
    case 'diet': {
      const ok = data.filter(d => isTrue(d.diet)).length;
      const pct = data.length ? Math.round(ok/data.length*100) : 0;
      html = stat('Taux de réussite', pct+'%', chartColor('diet', pct)) +
             stat('Jours respectés', ok+' / '+data.length);
      break;
    }
    case 'note':
      const maxNote = vals.length ? Math.max(...vals) : null;
      html = stat('Moyenne', fmtVal(avg,'note')) +
             stat('Meilleure note', fmtVal(maxNote,'note'), 'var(--green-light)') +
             stat("Aujourd'hui", fmtVal(todayVal,'note'), todayColor);
      break;
  }

  el.innerHTML = html;
}

window.setMetric = (metric, btn) => {
  chartMetric = metric;
  document.querySelectorAll('.metric-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderChart();
};

window.setPeriod = (p, btn) => {
  chartPeriod = p;
  document.querySelectorAll('.period-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderChart();
};

// ── BUSINESS ───────────────────────────────────────────────────────────────
function fmt(n) { return n.toLocaleString('fr-FR') + ' €'; }

function renderTrend(elId, cur, prev) {
  const el = document.getElementById(elId);
  if (!prev || prev === 0) { el.className = 'biz-trend neutral'; el.textContent = '—'; return; }
  const pct = Math.round(((cur - prev) / prev) * 100);
  if (pct >= 0) {
    el.className = 'biz-trend up';
    el.textContent = '↑ +' + pct + '%';
  } else {
    el.className = 'biz-trend down';
    el.textContent = '↓ ' + pct + '%';
  }
}

async function loadBusiness() {
  const now = new Date();
  const monthStr = now.toISOString().slice(0,7);
  const prevDate = new Date(now); prevDate.setMonth(prevDate.getMonth()-1);
  const prevStr  = prevDate.toISOString().slice(0,7);

  const res = await notionQuery(DB_BUSINESS, {}, [{ property: 'Mois', direction: 'descending' }]);
  const pages = res.results || [];

  const find = (str) => pages.find(p => { const m = getProp(p,'Mois'); return m && m.startsWith(str); });
  const cur  = find(monthStr);
  const prev = find(prevStr);

  const discordCur  = cur  ? (getProp(cur,  'CA Discord') || 0) : 0;
  const discordPrev = prev ? (getProp(prev, 'CA Discord') || 0) : 0;
  const ofmCur      = cur  ? (getProp(cur,  'CA OFM')     || 0) : 0;
  const ofmPrev     = prev ? (getProp(prev, 'CA OFM')     || 0) : 0;

  const monthTargets = [4000,5000,7000,8000,9000,10000,15000,20000,25000,30000,40000,50000];
  const goal = monthTargets[now.getMonth()] || 10000;

  // Discord
  document.getElementById('discord-ca').textContent = fmt(discordCur);
  document.getElementById('discord-goal-lbl').textContent = `Objectif ${fmt(goal)}`;
  document.getElementById('discord-pct').textContent = discordCur > 0 ? Math.round(discordCur/goal*100)+'%' : '—';
  document.getElementById('discord-bar').style.width = Math.min(100, Math.round(discordCur/goal*100))+'%';
  renderTrend('discord-trend', discordCur, discordPrev);

  // OFM
  document.getElementById('ofm-ca').textContent = fmt(ofmCur);
  document.getElementById('ofm-goal-lbl').textContent = `Objectif ${fmt(goal)}`;
  document.getElementById('ofm-pct').textContent = ofmCur > 0 ? Math.round(ofmCur/goal*100)+'%' : '—';
  document.getElementById('ofm-bar').style.width = Math.min(100, Math.round(ofmCur/goal*100))+'%';
  renderTrend('ofm-trend', ofmCur, ofmPrev);

  // Dubai
  const TARGET = 223000;
  const annualDiscord = pages.reduce((s,p) => { const y=getProp(p,'Mois')?.slice(0,4); return y===String(now.getFullYear()) ? s+(getProp(p,'CA Discord')||0) : s; }, 0);
  const annualOFM     = pages.reduce((s,p) => { const y=getProp(p,'Mois')?.slice(0,4); return y===String(now.getFullYear()) ? s+(getProp(p,'CA OFM')||0) : s; }, 0);
  const annualTotal   = annualDiscord + annualOFM;
  const pct = Math.min(100, (annualTotal/TARGET)*100);

  document.getElementById('dubai-amount').textContent   = fmt(annualTotal);
  document.getElementById('dubai-fill').style.width     = pct.toFixed(1)+'%';
  document.getElementById('dubai-pct').textContent      = pct.toFixed(1)+'%';
  document.getElementById('dubai-remaining').textContent= fmt(Math.max(0, TARGET-annualTotal));
  document.getElementById('dubai-discord').textContent  = fmt(annualDiscord);
  document.getElementById('dubai-ofm').textContent      = fmt(annualOFM);
  document.getElementById('dubai-total').textContent    = fmt(annualTotal);
}
